# Discord bot stack
#
# Bot only:
#   docker compose up -d --build
#
# Bot + Cloudflare Tunnel (token in .env as CLOUDFLARE_TUNNEL_TOKEN):
#   docker compose --profile tunnel up -d --build
#
# Tunnel route: bot.kiartv.de → http://discord-bot:${BOT_HEALTH_PORT:-3589}
# Website env:  DISCORD_BOT_HEALTH_URL=https://bot.kiartv.de/health

name: discord-bot

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BOT_HEALTH_PORT:-3589}:${BOT_HEALTH_PORT:-3589}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O- --header="Authorization: Bearer $$BOT_HEALTH_SECRET" "http://127.0.0.1:$${BOT_HEALTH_PORT:-3589}/health" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 75s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiNThlNGZkZTExYTkwOGFjOWQyZDI0NzE2MzIxOTFmNzgiLCJ0IjoiMjYyNmI0MjQtYTA0Ny00ZmFmLThlMWUtNzU5MWE0YWM4NGQzIiwicyI6Ik5UUXlPV05tWldJdFpEUXhPUzAwWm1WaExUZzVOakl0TjJNME1qVXlaVFpsWW1WbE5EWXdOMlpqTURrdE9EY3dNQzAwWXpJd0xXRmlZamt0TXpGaVlUUmhaVFJsTURVMyJ9
    depends_on:
      discord-bot:
        condition: service_healthy
    profiles:
      - tunnel
